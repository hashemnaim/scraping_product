services:
  - type: web
    name: scraping-product
    runtime: python
    plan: free
    repo: https://github.com/hashemnaim/scraping_product
    branch: main
    buildCommand: >-
      pip install -r requirements.txt &&
      python -m playwright install --with-deps chromium
    startCommand: >-
      streamlit run app/ui.py
      --server.port=$PORT
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PYTHONPATH
        value: .
      - key: INSTASHOP_HEADLESS
        value: "true"
