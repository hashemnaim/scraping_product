services:
  - type: web
    name: scraping-product
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      streamlit run app/ui.py
      --server.port=$PORT
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PYTHONPATH
        value: .
